<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sam Varghese — Photographer &amp; Videographer</title>

    <!-- Critical font connections -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- Preload the hero video so it starts buffering before JS runs -->
    <link rel="preload" href="/video/hero.mp4" as="video" type="video/mp4" />

    <!-- Prefetch the bio portrait used in the About section -->
    <link rel="prefetch" href="/images/bio/sam.jpg" as="image" />

    <!-- DNS prefetch for any external resources -->
    <link rel="dns-prefetch" href="https://www.instagram.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
